version: 1
cases:
  - id: C045
    name: two independent node patterns cartesian
    mapping_fixture: pg
    extensions_enabled: false
    cypher: |
      MATCH (u:User), (v:User)
      RETURN u.id, v.id
      ORDER BY u.id, v.id
      LIMIT 3
    expected:
      aql: |
        FOR u IN @@collection
          FOR v IN @@collection2
          SORT u.id, v.id
          LIMIT 3
          RETURN {id: u.id, v_id: v.id}
      bind_vars:
        "@collection": users
        "@collection2": users

  - id: C046
    name: shared variable join with 1-hop traversal
    mapping_fixture: pg
    extensions_enabled: false
    cypher: |
      MATCH (u:User), (u)-[:FOLLOWS]->(v:User)
      RETURN u.id, v.id
      ORDER BY u.id, v.id
      LIMIT 5
    expected:
      aql: |
        FOR u IN @@collection
          FOR v, r IN 1..1 OUTBOUND u @@edgeCollection
            FILTER IS_SAME_COLLECTION(@vCollection, v)
          SORT u.id, v.id
          LIMIT 5
          RETURN {id: u.id, v_id: v.id}
      bind_vars:
        "@collection": users
        "@edgeCollection": follows
        vCollection: users

  - id: C047
    name: shared intermediate variable across traversals (2 pattern parts)
    mapping_fixture: pg
    extensions_enabled: false
    cypher: |
      MATCH (u:User)-[:FOLLOWS]->(v:User), (v)-[:FOLLOWS]->(w:User)
      RETURN u.id, w.id
      ORDER BY u.id, w.id
    expected:
      aql: |
        FOR u IN @@uCollection
          FOR v, r IN 1..1 OUTBOUND u @@edgeCollection
            FILTER IS_SAME_COLLECTION(@vCollection, v)
          FOR w, r2 IN 1..1 OUTBOUND v @@edgeCollection2
            FILTER IS_SAME_COLLECTION(@wCollection, w)
          SORT u.id, w.id
          RETURN {id: u.id, w_id: w.id}
      bind_vars:
        "@uCollection": users
        "@edgeCollection": follows
        vCollection: users
        "@edgeCollection2": follows
        wCollection: users

  - id: C053
    name: distinct order skip limit in multi pattern parts
    mapping_fixture: pg
    extensions_enabled: false
    cypher: |
      MATCH (u:User), (v:User)
      RETURN DISTINCT v.city
      ORDER BY v.city
      SKIP 1
      LIMIT 1
    expected:
      aql: |
        FOR u IN @@collection
          FOR v IN @@collection2
          COLLECT city = v.city
          SORT city
          LIMIT 1, 1
          RETURN city
      bind_vars:
        "@collection": users
        "@collection2": users

  - id: C060
    name: shared end node across pattern parts (id equality join)
    mapping_fixture: pg
    extensions_enabled: false
    cypher: |
      MATCH (u:User)-[:FOLLOWS]->(v:User), (w:User)-[:FOLLOWS]->(v)
      RETURN u.id, w.id, v.id
      ORDER BY u.id, w.id, v.id
      LIMIT 10
    expected:
      aql: |
        FOR u IN @@uCollection
          FOR v, r IN 1..1 OUTBOUND u @@edgeCollection
            FILTER IS_SAME_COLLECTION(@vCollection, v)
          FOR w IN @@wCollection
          FOR v_m, r2 IN 1..1 OUTBOUND w @@edgeCollection2
            FILTER v_m._id == v._id
          SORT u.id, w.id, v.id
          LIMIT 10
          RETURN {id: u.id, w_id: w.id, v_id: v.id}
      bind_vars:
        "@uCollection": users
        "@edgeCollection": follows
        vCollection: users
        "@wCollection": users
        "@edgeCollection2": follows

