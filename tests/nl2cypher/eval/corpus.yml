version: 1
# Curated evaluation set for WP-25.5.  Kept intentionally small so a
# baseline refresh is cheap; expand in follow-ups.  Each case declares
# its category so the report can break down accuracy by category.
cases:
  # ---------------------------------------------------------------------
  # baseline — simple lookups / one-hop traversals
  # ---------------------------------------------------------------------
  - id: eval_001
    mapping_fixture: movies_pg
    question: "Which movies did Tom Hanks act in?"
    expected_patterns:
      - "(?is)MATCH.*Person.*Tom Hanks.*ACTED_IN.*Movie"
    category: baseline

  - id: eval_002
    mapping_fixture: movies_pg
    question: "Who directed The Matrix?"
    expected_patterns:
      - "(?is)MATCH.*Person.*DIRECTED.*Movie.*The Matrix"
    category: baseline

  - id: eval_003
    mapping_fixture: movies_pg
    question: "Count how many movies each director made"
    expected_patterns:
      - "(?is)DIRECTED.*Movie"
      - "(?is)count\\("
    category: baseline

  - id: eval_004
    mapping_fixture: movies_pg
    question: "List all movies released after 2000"
    expected_patterns:
      - "(?is)Movie"
      - "(?is)released.*>.*2000|released.*>=.*2001"
    category: baseline

  - id: eval_005
    mapping_fixture: movies_pg
    question: "Find the 5 most recent movies"
    expected_patterns:
      - "(?is)Movie"
      - "(?is)ORDER BY.*released.*DESC"
      - "(?is)LIMIT.*5"
    category: baseline

  # ---------------------------------------------------------------------
  # few_shot_bait — questions that mirror a seed corpus example closely
  # ---------------------------------------------------------------------
  - id: eval_010
    mapping_fixture: movies_pg
    question: "Find co-actors of Tom Hanks"
    expected_patterns:
      - "(?is)Tom Hanks"
      - "(?is)ACTED_IN.*ACTED_IN"
    category: few_shot_bait

  - id: eval_011
    mapping_fixture: movies_pg
    question: "Show me all the roles Tom Hanks played"
    expected_patterns:
      - "(?is)Tom Hanks"
      - "(?is)ACTED_IN"
      - "(?is)roles"
    category: few_shot_bait

  - id: eval_012
    mapping_fixture: movies_pg
    question: "Which person both acted in and directed the same movie?"
    expected_patterns:
      - "(?is)ACTED_IN"
      - "(?is)DIRECTED"
    category: few_shot_bait

  # ---------------------------------------------------------------------
  # typo — property values misspelled in the NL question
  # ---------------------------------------------------------------------
  - id: eval_020
    mapping_fixture: movies_pg
    question: "Who acted in Forest Gump?"
    expected_patterns:
      - "(?is)Forrest Gump"
    category: typo

  - id: eval_021
    mapping_fixture: movies_pg
    question: "Find movies with Toms Hanks"
    expected_patterns:
      - "(?is)Tom Hanks"
    category: typo

  # ---------------------------------------------------------------------
  # hallucination_bait — questions phrased to tempt label/collection invention
  # ---------------------------------------------------------------------
  - id: eval_030
    mapping_fixture: movies_pg
    question: "List all actors"
    expected_patterns:
      # Movies schema uses Person + ACTED_IN, not a dedicated Actor label
      - "(?is)Person.*ACTED_IN|ACTED_IN.*Person"
    category: hallucination_bait

  - id: eval_031
    mapping_fixture: movies_pg
    question: "Count the cast of each film"
    expected_patterns:
      - "(?is)Person.*ACTED_IN.*Movie|Movie.*ACTED_IN.*Person"
      - "(?is)count\\("
    category: hallucination_bait

  - id: eval_032
    mapping_fixture: movies_pg
    question: "Which reviewers rated movies?"
    expected_patterns:
      - "(?is)Person.*REVIEWED.*Movie"
    category: hallucination_bait

  # ---------------------------------------------------------------------
  # baseline (additions) — northwind coverage + a few more movies lookups
  # ---------------------------------------------------------------------
  - id: eval_006
    mapping_fixture: northwind_pg
    question: "List all customers based in Germany"
    expected_patterns:
      - "(?is)Customer"
      - "(?is)country.*=.*['\"]Germany['\"]"
    category: baseline

  - id: eval_007
    mapping_fixture: northwind_pg
    question: "Show products that have been discontinued"
    expected_patterns:
      - "(?is)Product"
      - "(?is)discontinued.*(=|IS).*(true|TRUE)"
    category: baseline

  - id: eval_008
    mapping_fixture: northwind_pg
    question: "How many orders did each employee handle?"
    expected_patterns:
      - "(?is)Order.*SOLD_BY.*Employee|Employee.*SOLD_BY.*Order"
      - "(?is)count\\("
    category: baseline

  - id: eval_009
    mapping_fixture: movies_pg
    question: "Find people born before 1950"
    expected_patterns:
      - "(?is)Person"
      - "(?is)born.*<.*1950"
    category: baseline

  # ---------------------------------------------------------------------
  # few_shot_bait (additions) — paraphrases of seed corpus examples
  # ---------------------------------------------------------------------
  - id: eval_013
    mapping_fixture: northwind_pg
    question: "What products are in the Beverages category?"
    expected_patterns:
      - "(?is)Product.*BELONGS_TO.*Category|Category.*BELONGS_TO.*Product"
      - "(?is)categoryName.*=.*['\"]Beverages['\"]"
    category: few_shot_bait

  - id: eval_014
    mapping_fixture: northwind_pg
    question: "For each customer, list the products they ended up buying"
    expected_patterns:
      - "(?is)Customer.*PURCHASED.*Order"
      - "(?is)Order.*CONTAINS.*Product"
    category: few_shot_bait

  - id: eval_015
    mapping_fixture: movies_pg
    question: "Top directors ranked by how many movies they've directed"
    expected_patterns:
      - "(?is)Person.*DIRECTED.*Movie|DIRECTED.*Movie"
      - "(?is)count\\("
      - "(?is)ORDER BY.*DESC"
    category: few_shot_bait

  # ---------------------------------------------------------------------
  # typo (additions) — more property-value misspellings + collection-style
  # ---------------------------------------------------------------------
  - id: eval_022
    mapping_fixture: movies_pg
    question: "Who acted in the Matrx?"
    expected_patterns:
      - "(?is)The Matrix"
      - "(?is)ACTED_IN"
    category: typo

  - id: eval_023
    mapping_fixture: movies_pg
    question: "Find movies directed by Lana Wachoski"
    expected_patterns:
      - "(?is)Lana Wachowski"
      - "(?is)DIRECTED"
    category: typo

  - id: eval_024
    mapping_fixture: northwind_pg
    question: "Show customers from Germny"
    expected_patterns:
      - "(?is)Customer"
      - "(?is)country.*=.*['\"]Germany['\"]"
    category: typo

  - id: eval_025
    mapping_fixture: northwind_pg
    question: "What did the customer Alfred Futerkist order?"
    expected_patterns:
      - "(?is)Alfreds Futterkiste"
      - "(?is)PURCHASED.*Order|Customer.*Order"
    category: typo

  # ---------------------------------------------------------------------
  # hallucination_bait (additions) — words that tempt invented labels/edges
  # ---------------------------------------------------------------------
  - id: eval_033
    mapping_fixture: northwind_pg
    question: "Which buyers are based in London?"
    expected_patterns:
      # Northwind has Customer (not Buyer); city='London' is the right filter
      - "(?is)Customer"
      - "(?is)city.*=.*['\"]London['\"]"
    category: hallucination_bait

  - id: eval_034
    mapping_fixture: northwind_pg
    question: "List vendors and the items they supply"
    expected_patterns:
      # Northwind has Supplier + Product, not Vendor + Item
      - "(?is)Supplier"
      - "(?is)Product"
      - "(?is)SUPPLIED_BY"
    category: hallucination_bait

  - id: eval_035
    mapping_fixture: movies_pg
    question: "Which films feature Keanu Reeves?"
    expected_patterns:
      # Schema uses Movie, not Film
      - "(?is)Movie"
      - "(?is)Keanu Reeves"
      - "(?is)ACTED_IN"
    category: hallucination_bait

  - id: eval_036
    mapping_fixture: movies_pg
    question: "Who are the screenwriters of The Matrix?"
    expected_patterns:
      # Schema uses WROTE (not WRITTEN_BY / SCREENPLAY_BY etc.)
      - "(?is)Person.*WROTE.*Movie|WROTE.*Movie"
      - "(?is)The Matrix"
    category: hallucination_bait

  # ---------------------------------------------------------------------
  # multi_hop — questions that require >=2 traversals; stress few-shot retrieval
  # ---------------------------------------------------------------------
  - id: eval_040
    mapping_fixture: movies_pg
    question: "Find people who acted in a movie that was directed by Tom Hanks"
    expected_patterns:
      - "(?is)ACTED_IN"
      - "(?is)DIRECTED"
      - "(?is)Tom Hanks"
    category: multi_hop

  - id: eval_041
    mapping_fixture: northwind_pg
    question: "List the suppliers of the products Alfreds Futterkiste has bought"
    expected_patterns:
      - "(?is)Alfreds Futterkiste"
      - "(?is)PURCHASED"
      - "(?is)CONTAINS"
      - "(?is)SUPPLIED_BY"
    category: multi_hop

  - id: eval_042
    mapping_fixture: movies_pg
    question: "Find directors whose movies were also reviewed by someone"
    expected_patterns:
      - "(?is)DIRECTED"
      - "(?is)REVIEWED"
    category: multi_hop

