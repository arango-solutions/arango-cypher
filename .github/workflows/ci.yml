name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      # `ruff format .` was applied repo-wide in audit-v2 batch 2
      # (commit `b0a3241`, 102 files reformatted, zero behaviour change),
      # so the format gate is now enforced. To unbreak a future PR that
      # trips this, run `ruff format .` locally and recommit.
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Floor matches `requires-python = ">=3.11"` in pyproject.toml.
        # 3.10 was historically in this matrix but has never actually
        # installed (pip rejects at resolve time) since the StrEnum
        # adoption in nl2cypher/tenant_scope.py — keeping it on the
        # matrix only painted the whole job red. Re-add only if the
        # `requires-python` floor moves down too.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -m "not integration and not tck" --tb=short -q

  packaging:
    # Smoke-tests that pyproject.toml resolves to an installable wheel
    # set in a clean Python environment -- the same check ServiceMaker
    # performs when building the Arango Platform container image.
    # See docs/arango_packaging_service/deployment_runbook.md and
    # docs/python_prd.md #15.3 for the design rationale.
    #
    # Two cases in the target file; both run under RUN_PACKAGING=1:
    #   * test_pyproject_extras_pin_published_versions_only  (~50 ms)
    #   * test_sdist_builds_and_imports_with_service_extras  (25-90 s)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - env:
          RUN_PACKAGING: "1"
        run: pytest tests/integration/test_packaging_smoke.py -v --tb=short

  integration:
    runs-on: ubuntu-latest
    services:
      arangodb:
        image: arangodb/arangodb:3.11
        env:
          ARANGO_ROOT_PASSWORD: openSesame
        ports:
          - 28529:8529
        options: >-
          --health-cmd "wget -qO- --header='Content-Type: application/json' --post-data '{\"username\":\"root\",\"password\":\"openSesame\"}' http://127.0.0.1:8529/_open/auth >/dev/null 2>&1"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 40
    env:
      ARANGO_URL: http://localhost:28529
      ARANGO_USER: root
      ARANGO_PASS: openSesame
      ARANGO_DB: _system
      RUN_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -m integration --tb=short -q
