[project]
name = "arango-cypher-py"
version = "0.0.0"
description = "Python-native Cypher to AQL transpiler for ArangoDB."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
  "python-arango>=8.1.1",
  "antlr4-python3-runtime",
]

[project.urls]
Homepage = "https://github.com/ArthurKeen/arango-cypher-py"
Repository = "https://github.com/ArthurKeen/arango-cypher-py"
Issues = "https://github.com/ArthurKeen/arango-cypher-py/issues"

[project.optional-dependencies]
service = [
  "fastapi>=0.100.0",
  "uvicorn[standard]>=0.20.0",
]
dev = [
  "pytest>=8.0.0",
  "pytest-cov>=5.0.0",
  "ruff>=0.6.0",
  "antlr4-tools",
  "PyYAML>=6.0.0",
  "httpx>=0.24.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
  "integration: requires a running ArangoDB (see README); isolated profile tests use docker-compose.pytest.yml on port 28530",
  "tck: openCypher TCK harness and runners",
]

[tool.ruff]
line-length = 110
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[build-system]
requires = ["hatchling>=1.21.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["arango_query_core", "arango_cypher"]

